<body class="font-body-md text-on-surface min-h-screen flex flex-col">
<!-- Top Navigation & Progress Bar -->
<header class="w-full bg-background z-50">
<div class="flex justify-between items-center w-full px-margin-mobile h-14">
<button class="w-10 h-10 flex items-center justify-start hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<div class="font-headline-lg-mobile text-headline-lg-mobile font-bold tracking-tighter text-primary">
        FORTE
      </div>
<div class="w-10"></div> <!-- Spacer for symmetry -->
</div>
<!-- Segmented Progress Bar: Step 2 of 10 -->
<div class="px-margin-mobile flex gap-1 pb-4">
<div class="progress-segment active"></div>
<div class="progress-segment active"></div>
<div class="progress-segment"></div>
<div class="progress-segment"></div>
<div class="progress-segment"></div>
<div class="progress-segment"></div>
<div class="progress-segment"></div>
<div class="progress-segment"></div>
<div class="progress-segment"></div>
<div class="progress-segment"></div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow px-margin-mobile pt-xl pb-margin-mobile max-w-lg mx-auto w-full">
<!-- Question Header -->
<div class="text-center mb-xl">
<h1 class="font-headline-md text-headline-md text-on-surface mb-xs">
        What is your primary goal?
      </h1>
<p class="font-body-md text-body-md text-on-surface-variant opacity-70">
        Select the area you want to focus on most.
      </p>
</div>
<!-- Single Choice List -->
<div class="space-y-md">
<!-- Option 1 -->
<div class="option-card group cursor-pointer relative bg-surface border border-[#E6E1E4] rounded-xl p-lg flex items-center justify-between transition-all duration-300 hover:border-primary" onclick="selectGoal(this)">
<span class="font-body-lg text-body-lg font-semibold text-on-surface">Lose weight</span>
<div class="check-mark opacity-0 w-6 h-6 rounded-full border-2 border-primary flex items-center justify-center transition-all duration-200 group-[.selected]:opacity-100 bg-primary">
<span class="material-symbols-outlined text-white text-[18px]">check</span>
</div>
</div>
<!-- Option 2 -->
<div class="option-card group cursor-pointer relative bg-surface border border-[#E6E1E4] rounded-xl p-lg flex items-center justify-between transition-all duration-300 hover:border-primary" onclick="selectGoal(this)">
<span class="font-body-lg text-body-lg font-semibold text-on-surface">Tone my body</span>
<div class="check-mark opacity-0 w-6 h-6 rounded-full border-2 border-primary flex items-center justify-center transition-all duration-200 group-[.selected]:opacity-100 bg-primary">
<span class="material-symbols-outlined text-white text-[18px]">check</span>
</div>
</div>
<!-- Option 3 -->
<div class="option-card group cursor-pointer relative bg-surface border border-[#E6E1E4] rounded-xl p-lg flex items-center justify-between transition-all duration-300 hover:border-primary" onclick="selectGoal(this)">
<span class="font-body-lg text-body-lg font-semibold text-on-surface">Improve fitness</span>
<div class="check-mark opacity-0 w-6 h-6 rounded-full border-2 border-primary flex items-center justify-center transition-all duration-200 group-[.selected]:opacity-100 bg-primary">
<span class="material-symbols-outlined text-white text-[18px]">check</span>
</div>
</div>
<!-- Option 4 -->
<div class="option-card group cursor-pointer relative bg-surface border border-[#E6E1E4] rounded-xl p-lg flex items-center justify-between transition-all duration-300 hover:border-primary" onclick="selectGoal(this)">
<span class="font-body-lg text-body-lg font-semibold text-on-surface">Build a routine</span>
<div class="check-mark opacity-0 w-6 h-6 rounded-full border-2 border-primary flex items-center justify-center transition-all duration-200 group-[.selected]:opacity-100 bg-primary">
<span class="material-symbols-outlined text-white text-[18px]">check</span>
</div>
</div>
</div>
<!-- Motivational Image Section -->

<div class="h-64 bg-cover bg-center transition-transform duration-700 group-hover:scale-105" data-alt="A focused, fit woman in a high-end minimalist home gym doing a deep lunge with a kettlebell. The environment is flooded with soft morning natural light through large windows, creating a serene and premium atmosphere. Her workout gear is modern and professional, reflecting an empowered and sophisticated fitness lifestyle. High-resolution editorial style photography with soft shadows and warm, elegant tones consistent with a luxury wellness brand." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCXu42CuK_eaMxg9Gv37SzA4aM017Nc9leaGrDjoh6Y93MvgxeIaPlTHaHu4jKrP8fuc56J_nSzDdqv528br1_vIazZov_xOpfFpVitYqq7SE1mqE_9PGf4vB5ExciiZZDwFUfMXTRLaduodXFXkGjpwdA-jmXC6pTrirTnIS1iC4xmPgqneVVhM7oI2bKdlaq-P7r8Tp4VaKrce_RhLx3kmwuPRTBr3aUx6Sz_twWjtOXD8GAdVbMfce9GsY319bXgc_Fm8MrCNOc')">

</div>

</main>
<script>
    function selectGoal(element) {
      // Clear previous selection
      document.querySelectorAll('.option-card').forEach(card => {
        card.classList.remove('selected', 'border-primary', 'ring-1', 'ring-primary');
      });
      
      // Add visual feedback to current selection
      element.classList.add('selected', 'border-primary', 'ring-1', 'ring-primary');
      
      // Simulate a small delay for visual feedback before "advancing"
      setTimeout(() => {
        console.log("Goal selected: " + element.querySelector('span').innerText);
        // In a real funnel, this would trigger navigation to the next step
        alert("Goal selected: " + element.querySelector('span').innerText + ". Advancing to next step...");
      }, 400);
    }
  </script>
