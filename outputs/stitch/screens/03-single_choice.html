            Step 3 of 10 • Selection will auto-advance

<script>
        // Simple Micro-interaction to handle the selection state visual change (beyond CSS radio)
        const radios = document.querySelectorAll('input[name="goal"]');
        radios.forEach(radio => {
            radio.addEventListener('change', (e) => {
                // Remove selected styling from all
                document.querySelectorAll('.option-card').forEach(card => {
                    card.classList.remove('border-primary', 'ring-2', 'ring-primary/10');
                    card.classList.add('border-outline-variant');
                    const checkContainer = card.querySelector('div:last-child');
                    checkContainer.innerHTML = '';
                    checkContainer.classList.remove('bg-primary', 'border-primary');
                    checkContainer.classList.add('border-outline-variant');
                });

                // Add to selected
                if (e.target.checked) {
                    const card = e.target.nextElementSibling;
                    card.classList.remove('border-outline-variant');
                    card.classList.add('border-primary', 'ring-2', 'ring-primary/10');
                    
                    const checkContainer = card.querySelector('div:last-child');
                    checkContainer.classList.remove('border-outline-variant');
                    checkContainer.classList.add('bg-primary', 'border-primary');
                    checkContainer.innerHTML = '<span class="material-symbols-outlined text-white text-[18px]" style="font-variation-settings: \'FILL\' 1;">check</span>';
                    
                    // Auto-advance simulation delay
                    setTimeout(() => {
                        console.log('Navigating to next step with selection:', e.target.value);
                    }, 600);
                }
            });
        });
    </script>
