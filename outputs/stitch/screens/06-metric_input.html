<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>FORTE - Metric Input</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container-highest": "#fcdade",
                    "tertiary-fixed-dim": "#6bdd90",
                    "surface-container-lowest": "#ffffff",
                    "primary-fixed-dim": "#ffb2bd",
                    "on-error-container": "#93000a",
                    "surface-container-high": "#ffe1e4",
                    "inverse-on-surface": "#ffecee",
                    "error": "#ba1a1a",
                    "on-primary-fixed-variant": "#900037",
                    "error-container": "#ffdad6",
                    "on-error": "#ffffff",
                    "on-secondary-fixed-variant": "#831e49",
                    "secondary-container": "#fe80ab",
                    "on-secondary-fixed": "#3e001d",
                    "tertiary-fixed": "#88faaa",
                    "outline-variant": "#e5bcc1",
                    "background": "#fff8f7",
                    "surface-variant": "#fcdade",
                    "inverse-surface": "#3f2b2e",
                    "tertiary": "#006a37",
                    "inverse-primary": "#ffb2bd",
                    "on-tertiary": "#ffffff",
                    "on-secondary": "#ffffff",
                    "surface": "#fff8f7",
                    "primary-container": "#e6005c",
                    "surface-container-low": "#fff0f1",
                    "on-primary-container": "#fffbff",
                    "surface-bright": "#fff8f7",
                    "outline": "#916e73",
                    "primary-fixed": "#ffd9dd",
                    "secondary-fixed": "#ffd9e2",
                    "on-tertiary-fixed": "#00210d",
                    "secondary": "#a23761",
                    "on-tertiary-container": "#f6fff4",
                    "primary": "#b80048",
                    "on-tertiary-fixed-variant": "#005229",
                    "on-background": "#281719",
                    "on-secondary-container": "#771340",
                    "surface-container": "#ffe9ea",
                    "surface-tint": "#bc004a",
                    "secondary-fixed-dim": "#ffb1c8",
                    "on-surface": "#281719",
                    "tertiary-container": "#008647",
                    "on-surface-variant": "#5c3f43",
                    "on-primary": "#ffffff",
                    "on-primary-fixed": "#400014",
                    "surface-dim": "#f3d2d6"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "xl": "32px",
                    "margin-mobile": "20px",
                    "gutter-mobile": "12px",
                    "base": "4px",
                    "sm": "8px",
                    "xs": "4px",
                    "md": "16px",
                    "lg": "24px"
            },
            "fontFamily": {
                    "label-sm": ["Inter"],
                    "headline-lg-mobile": ["Plus Jakarta Sans"],
                    "body-lg": ["Inter"],
                    "headline-md": ["Plus Jakarta Sans"],
                    "label-lg": ["Inter"],
                    "display-lg": ["Plus Jakarta Sans"],
                    "headline-lg": ["Plus Jakarta Sans"],
                    "body-md": ["Inter"]
            },
            "fontSize": {
                    "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                    "headline-lg-mobile": ["28px", {"lineHeight": "34px", "fontWeight": "700"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                    "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.02em", "fontWeight": "600"}],
                    "display-lg": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        body {
            background-color: #F8F5F7;
            font-family: 'Inter', sans-serif;
            color: #281719; /* Charcoal-ish text from system */
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .metric-input-focus:focus {
            outline: none;
            border-color: #b80048;
        }
        .transition-all-custom {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col items-center">
<!-- Top Navigation (Based on Shared Components TopAppBar) -->
<header class="w-full top-0 sticky z-50 bg-background flex flex-col">
<div class="flex items-center justify-between px-margin-mobile h-14 w-full">
<button class="active:scale-95 transition-transform duration-200 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold tracking-tight text-on-background">Profile</h1>
<div class="w-10"></div> <!-- Spacer for center alignment -->
</div>
<!-- Progress Indicator Segment -->
<div class="px-margin-mobile h-1 mb-2">
<div class="w-full h-full bg-surface-container rounded-full overflow-hidden">
<div class="w-2/3 h-full bg-primary transition-all duration-700 ease-out"></div>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-md px-margin-mobile flex flex-col pt-xl pb-32">
<!-- Header Text -->
<div class="text-center mb-xl">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-background">What is your current weight?</h2>
</div>
<!-- Unit Toggle -->
<div class="flex justify-center mb-xl">
<div class="bg-surface-container p-1 rounded-xl flex items-center shadow-inner">
<button class="px-8 py-2 rounded-lg font-label-lg text-label-lg transition-all-custom text-on-surface-variant hover:text-on-surface" id="toggleLbs">
                    lbs
                </button>
<button class="px-8 py-2 rounded-lg font-label-lg text-label-lg transition-all-custom bg-primary text-on-primary shadow-md" id="toggleKg">
                    kg
                </button>
</div>
</div>
<!-- Weight Input -->
<div class="flex-1 flex flex-col items-center justify-center py-xl">
<div class="flex items-baseline space-x-2">
<input class="bg-transparent border-none text-center font-display-lg text-[80px] leading-tight text-on-background w-32 focus:ring-0 metric-input-focus" id="weightInput" maxlength="3" type="number" value="60"/>
<span class="font-headline-md text-headline-md text-primary" id="unitLabel">kg</span>
</div>
<!-- Atmospheric Shader or Background Graphic placeholder -->
<div class="mt-8 relative w-48 h-48 flex items-center justify-center opacity-10">
<!-- Example of an animated atmospheric element -->
<div class="absolute inset-0 rounded-full border-4 border-primary border-dashed animate-[spin_10s_linear_infinite]"></div>
<span class="material-symbols-outlined text-8xl text-primary" data-icon="monitor_weight">monitor_weight</span>
</div>
</div>
<!-- Helper Card -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-md shadow-sm transition-all hover:shadow-md">
<div class="flex items-start gap-sm">
<span class="material-symbols-outlined text-primary" data-icon="info" style="font-variation-settings: 'FILL' 1;">info</span>
<div class="flex flex-col">
<h3 class="font-label-lg text-label-lg text-on-background mb-xs">Calculating your body mass index</h3>
<p class="font-body-md text-body-md text-on-surface-variant">Your weight is used to personalize your workout intensity and provide accurate calorie tracking. We keep your data secure.</p>
</div>
</div>
</div>
</main>
<!-- Fixed Bottom CTA -->
<div class="fixed bottom-0 left-0 w-full p-margin-mobile bg-gradient-to-t from-background via-background/95 to-transparent pt-8">
<div class="max-w-md mx-auto">
<button class="w-full h-14 bg-primary text-on-primary font-bold rounded-xl shadow-lg active:scale-95 transition-all-custom flex items-center justify-center gap-sm">
<span class="font-label-lg text-label-lg">Continue</span>
<span class="material-symbols-outlined" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</div>
<!-- Script for interactive elements -->
<script>
        const weightInput = document.getElementById('weightInput');
        const toggleKg = document.getElementById('toggleKg');
        const toggleLbs = document.getElementById('toggleLbs');
        const unitLabel = document.getElementById('unitLabel');

        toggleKg.addEventListener('click', () => {
            toggleKg.classList.add('bg-primary', 'text-on-primary', 'shadow-md');
            toggleKg.classList.remove('text-on-surface-variant');
            toggleLbs.classList.remove('bg-primary', 'text-on-primary', 'shadow-md');
            toggleLbs.classList.add('text-on-surface-variant');
            unitLabel.innerText = 'kg';
            
            // Logic to convert from lbs to kg if we were in lbs
            if (weightInput.dataset.unit === 'lbs') {
                const currentVal = parseFloat(weightInput.value);
                weightInput.value = Math.round(currentVal / 2.20462);
            }
            weightInput.dataset.unit = 'kg';
        });

        toggleLbs.addEventListener('click', () => {
            toggleLbs.classList.add('bg-primary', 'text-on-primary', 'shadow-md');
            toggleLbs.classList.remove('text-on-surface-variant');
            toggleKg.classList.remove('bg-primary', 'text-on-primary', 'shadow-md');
            toggleKg.classList.add('text-on-surface-variant');
            unitLabel.innerText = 'lbs';

            // Logic to convert from kg to lbs
            if (weightInput.dataset.unit !== 'lbs') {
                const currentVal = parseFloat(weightInput.value);
                weightInput.value = Math.round(currentVal * 2.20462);
            }
            weightInput.dataset.unit = 'lbs';
        });

        // Initialize dataset
        weightInput.dataset.unit = 'kg';

        // Auto-focus on input for seamless experience
        window.addEventListener('load', () => {
            setTimeout(() => {
                weightInput.focus();
                // Ensure cursor is at the end
                const val = weightInput.value;
                weightInput.value = '';
                weightInput.value = val;
            }, 500);
        });
    </script>
</body></html>
