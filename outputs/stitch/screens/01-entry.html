<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        
        body {
            background-color: #F8F5F7;
            color: #22242A;
            -webkit-font-smoothing: antialiased;
        }

        .hero-gradient {
            background: linear-gradient(to bottom, rgba(40, 23, 25, 0) 60%, rgba(40, 23, 25, 0.4) 100%);
        }
        
        /* Smooth transitions for interactions */
        .btn-active-scale:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
<!-- Mobile Screen Wrapper (390px) -->
<main class="w-[390px] h-[844px] bg-background relative overflow-hidden flex flex-col shadow-2xl rounded-[3rem] border-[8px] border-on-background">
<!-- TopAppBar (Mapped from JSON) -->
<header class="absolute top-0 left-0 right-0 z-50 flex justify-between items-center h-16 px-margin-mobile w-full bg-transparent">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary font-display-lg text-display-lg" data-icon="fitness_center">fitness_center</span>
<h1 class="font-display-lg text-display-lg tracking-tighter text-primary">FORTE</h1>
</div>
<button class="font-label-lg text-label-lg text-on-surface-variant hover:opacity-80 transition-opacity active:scale-95 duration-200">
                Login
            </button>
</header>
<!-- Hero Section (60% height) -->
<section class="relative h-[60%] w-full overflow-hidden">
<img alt="Professional woman in fitness attire performing a controlled kettlebell lunge in a bright, modern minimalist home environment with large windows and neutral tones." class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBtmHrEcf9Oohpu1TsbtNK4WTK7o8_lxqQwR_5GD8kf5Hr2YwUbes2Lv7FswBufKDAqw5_gmSUU7yHyADJUAxjviR377YcJP0rjTbIJ8PdGFEKIg60lMaynnRDYD0HZbcVZyFHqleJ0heaNwd8jV7iS7odYgdbJoS7SU4htqFX3EtoTvTkCs6Akmb1Ytyf2F9pgurTw-0KI81Z_kRPm0AUtOrn9C-3FBxpLBH9z8aSZBmAwhwCgKYIoPXDX5GUtlSQYWCgrueeR9xM"/>
<div class="absolute inset-0 hero-gradient"></div>
</section>
<!-- Content Canvas -->
<section class="flex-1 bg-background relative z-10 -mt-8 rounded-t-[32px] px-margin-mobile pt-xl flex flex-col items-center text-center">
<div class="space-y-md">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-background leading-tight">
                    Create your personalized home fitness plan
                </h2>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[320px]">
                    Achieve your goals with a plan tailored to your body, schedule, and baseline.
                </p>
</div>
<!-- CTA Container -->
<div class="mt-auto mb-margin-mobile w-full">
<button class="w-full h-[56px] bg-[#F20562] text-on-secondary rounded-xl font-headline-md text-headline-md flex items-center justify-center btn-active-scale transition-transform duration-200 shadow-[0px_10px_30px_rgba(242,5,98,0.2)]">
                    Get started
                </button>
<p class="mt-md font-label-sm text-label-sm text-outline">
                    Premium editorial-style training at your fingertips
                </p>
</div>
</section>
<!-- Bottom Status Bar Decoration (Optional for Mobile feel) -->
<div class="absolute bottom-2 left-1/2 -translate-x-1/2 w-32 h-1 bg-on-background/20 rounded-full"></div>
</main>
<script>
        // Micro-interaction for the button
        const startBtn = document.querySelector('button');
        if (startBtn) {
            startBtn.addEventListener('mousedown', () => {
                startBtn.style.boxShadow = '0px 5px 15px rgba(242,5,98,0.1)';
            });
            startBtn.addEventListener('mouseup', () => {
                startBtn.style.boxShadow = '0px 10px 30px rgba(242,5,98,0.2)';
            });
        }
    </script>
</body></html>
