<script>
        function selectAge(element) {
            // Remove active state from all cards
            const cards = document.querySelectorAll('.age-card');
            cards.forEach(card => card.classList.remove('active-card'));
            
            // Add active state to clicked card
            element.classList.add('active-card');
            
            // Enable continue button
            const btn = document.getElementById('continue-btn');
            btn.disabled = false;
            btn.classList.remove('bg-[#E6E1E4]', 'opacity-50', 'cursor-not-allowed');
            btn.classList.add('bg-primary', 'shadow-lg', 'active:scale-95');
            
            // Subtle feedback - progress bar update simulation
            const progressBar = document.querySelector('.progress-bar-fill');
            progressBar.style.width = '40%';
        }

        // Simple button interaction
        document.getElementById('continue-btn').addEventListener('click', function() {
            if(!this.disabled) {
                this.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span>';
                setTimeout(() => {
                    this.innerHTML = 'Continue';
                    // Intent: Proceed to next step in onboarding
                }, 800);
            }
        });
    </script>
